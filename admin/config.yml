backend:
  name: github
  repo: srsand/sandve-lab
  branch: main
  auth_type: pkce
  app_id: Ov23linU62SNFKHCGI0j

media_folder: images/uploaded
public_folder: /images/uploaded

collections:

  - name: "news"
    label: "News / Lab Updates"
    files:
      - label: "Lab Updates"
        name: "news_items"
        file: "_data/news.json"
        fields:
          - label: "News Items"
            name: "items"
            widget: "list"
            summary: "{{fields.date}}"
            fields:
              - label: "Date"
                name: "date"
                widget: "string"
                hint: "e.g. June 2026"
              - label: "Content"
                name: "content"
                widget: "markdown"

  - name: "preprints"
    label: "Preprints"
    files:
      - label: "Preprints List"
        name: "preprints_list"
        file: "_data/preprints.json"
        fields:
          - label: "Preprints"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Authors"
                name: "authors"
                widget: "string"
              - label: "Server"
                name: "server"
                widget: "select"
                options: ["bioRxiv", "medRxiv", "arXiv", "Other"]
                default: "bioRxiv"
              - label: "Year"
                name: "year"
                widget: "string"
              - label: "Preprint URL"
                name: "url"
                widget: "string"
              - label: "DOI"
                name: "doi"
                widget: "string"
                required: false
              - label: "Short description"
                name: "description"
                widget: "text"
                required: false

  - name: "people_current"
    label: "People - Current Members"
    files:
      - label: "Current Members"
        name: "current_members"
        file: "_data/people-current.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - label: "Full name"
                name: "name"
                widget: "string"
              - label: "Role"
                name: "role"
                widget: "select"
                options:
                  - "Professor"
                  - "Associate Professor"
                  - "Researcher"
                  - "Postdoc"
                  - "PhD student"
                  - "MSc student"
                  - "Research assistant"
                  - "Visiting researcher"
              - label: "Photo"
                name: "photo"
                widget: "image"
                required: false
                media_folder: /images/people
                public_folder: /images/people
              - label: "Website URL"
                name: "url"
                widget: "string"
                required: false

  - name: "people_previous"
    label: "People - Previous Members"
    files:
      - label: "Previous Members"
        name: "previous_members"
        file: "_data/people-previous.json"
        fields:
          - label: "Previous Members"
            name: "members"
            widget: "list"
            summary: "{{fields.name}} ({{fields.year}})"
            fields:
              - label: "Full name"
                name: "name"
                widget: "string"
              - label: "Role"
                name: "role"
                widget: "string"
              - label: "Year"
                name: "year"
                widget: "string"
              - label: "Tags"
                name: "tags"
                widget: "string"
                required: false
          - label: "Co-supervised PhD students"
            name: "cosupervised"
            widget: "text"
