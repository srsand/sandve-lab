# Decap CMS configuration
# Docs: https://decapcms.org/docs/

backend:
  name: github
  repo: srsand/sandve-lab
  branch: main
  auth_type: pkce
  app_id: YOUR_GITHUB_OAUTH_APP_CLIENT_ID   # ← CHANGE after creating OAuth app

# Where uploaded images are stored in the repo
media_folder: images/uploaded
public_folder: /images/uploaded

# ──────────────────────────────────────────────
# COLLECTIONS
# ──────────────────────────────────────────────
collections:

  # ── News ──────────────────────────────────
  - name: "news"
    label: "News / Lab Updates"
    files:
      - label: "Lab Updates"
        name: "news_items"
        file: "_data/news.json"
        fields:
          - label: "News Items"
            name: "items"
            widget: "list"
            summary: "{{fields.date}}"
            add_to_top: true
            fields:
              - label: "Date"
                name: "date"
                widget: "string"
                hint: "e.g. April 2026  or  March–April 2026"
              - label: "Content"
                name: "content"
                widget: "markdown"
                hint: "Use bullet points (- item) for lists. Links: [text](url). Bold: **text**"
                buttons: [bold, italic, link, bulleted-list]
                editor_components: []

  # ── Preprints ─────────────────────────────
  - name: "preprints"
    label: "Preprints"
    files:
      - label: "Preprints List"
        name: "preprints_list"
        file: "_data/preprints.json"
        fields:
          - label: "Preprints"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.year}})"
            add_to_top: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Authors"
                name: "authors"
                widget: "string"
                hint: "e.g. Sandve SR, Baalsrud HT, et al."
              - label: "Server"
                name: "server"
                widget: "select"
                options: ["bioRxiv", "medRxiv", "arXiv", "EarthArXiv", "Other"]
                default: "bioRxiv"
              - label: "Year"
                name: "year"
                widget: "string"
              - label: "Preprint URL"
                name: "url"
                widget: "string"
              - label: "DOI"
                name: "doi"
                widget: "string"
                required: false
                hint: "Just the DOI suffix, e.g. 10.1101/2025.02.20.639118"
              - label: "Short description"
                name: "description"
                widget: "text"
                required: false

  # ── Current people ─────────────────────────
  - name: "people_current"
    label: "People – Current Members"
    files:
      - label: "Current Members"
        name: "current_members"
        file: "_data/people-current.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            summary: "{{fields.name}} – {{fields.role}}"
            fields:
              - label: "Full name"
                name: "name"
                widget: "string"
              - label: "Role"
                name: "role"
                widget: "select"
                options:
                  - "Professor"
                  - "Associate Professor"
                  - "Researcher"
                  - "Postdoc"
                  - "PhD student"
                  - "MSc student"
                  - "Research assistant"
                  - "Visiting researcher"
              - label: "Photo"
                name: "photo"
                widget: "image"
                required: false
                hint: "Upload a portrait photo. Will be stored in /images/uploaded/"
                media_folder: /images/people
                public_folder: /images/people
              - label: "Personal/NMBU website URL"
                name: "url"
                widget: "string"
                required: false

  # ── Previous people ────────────────────────
  - name: "people_previous"
    label: "People – Previous Members"
    files:
      - label: "Previous Members"
        name: "previous_members"
        file: "_data/people-previous.json"
        fields:
          - label: "Previous Members"
            name: "members"
            widget: "list"
            summary: "{{fields.name}} ({{fields.year}})"
            fields:
              - label: "Full name"
                name: "name"
                widget: "string"
              - label: "Role / position"
                name: "role"
                widget: "string"
                hint: "e.g. MSc student  or  PhD student  or  Postdoc in molecular biology"
              - label: "Year"
                name: "year"
                widget: "string"
                hint: "Year of completion, e.g. 2024  or  2020–2022"
              - label: "Research topics / tags"
                name: "tags"
                widget: "string"
                required: false
                hint: "Comma-separated, e.g. Atlantic salmon, smoltification, omics"
          - label: "Co-supervised PhD students"
            name: "cosupervised"
            widget: "text"
            hint: "Free-text list, e.g. Name (year– ), Name (year)"
